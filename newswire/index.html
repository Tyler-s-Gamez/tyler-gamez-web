<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler's Gamez</title>
    <link rel="icon" type="image/png" href="/assets/icons/TylerGamezIconV2.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0c10; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; background: rgba(11, 12, 16, 0.8); backdrop-filter: blur(10px);
            position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo-img { width: 35px; height: 35px; border-radius: 6px; }
        .logo { font-size: 24px; font-weight: 800; color: rgb(253, 204, 54); }
        .nav-links a { color: #c5c6c7; text-decoration: none; font-size: 16px; font-weight: 600; padding: 8px 16px; }
        .nav-links a:hover { color: rgb(253, 204, 54); }

        main { flex: 1; max-width: 1200px; width: 100%; margin: 120px auto 60px auto; padding: 0 20px; display: flex; flex-direction: column; }
        
        .section-header { margin-bottom: 40px; }
        .section-header h1 { font-size: 36px; font-weight: 900; color: #ffffff; }

        /* Rockstar Style 3-Column Grid Layout */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 24px; 
            margin-bottom: 50px;
        }

        .news-card {
            background: #0e0f14; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px; 
            text-decoration: none; 
            color: inherit;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .news-card:hover {
            transform: translateY(-4px);
            border-color: rgba(253, 204, 54, 0.4);
        }

        .card-img-container {
            width: 100%;
            aspect-ratio: 16 / 14;
            background: #12131a;
            overflow: hidden;
        }
        .card-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-meta { 
            font-size: 13px; 
            font-weight: 700; 
            color: #8f9296; 
            margin-bottom: 12px; 
        }
        .news-meta .tag {
            color: #ffffff;
            margin-right: 8px;
        }

        .news-card h3 { 
            font-size: 20px; 
            font-weight: 800; 
            color: #ffffff; 
            line-height: 1.3;
        }

        /* Pagination Alignment Footer */
        .pagination-container {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
            padding-top: 20px;
        }
        .more-stories-btn {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            padding-bottom: 6px;
            border-bottom: 3px solid rgb(253, 204, 54);
            transition: color 0.2s;
        }
        .more-stories-btn:hover {
            color: rgb(253, 204, 54);
        }

        @media (max-width: 900px) {
            .news-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .news-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo-container">
            <img src="/assets/icons/TylerGamezIconV2.png" alt="Logo" class="nav-logo-img">
            <div class="logo">Tyler's Gamez</div>
        </a>
        <nav class="nav-links">
            <a href="/games/">Our Games</a>
            <a href="/about-us/">About Us</a>
        </nav>
    </header>

    <main>
        <div class="section-header">
            <h1>Newswire</h1>
        </div>

        <div class="news-grid">
            <!-- Article 25 Card -->
            <a href="/newswire/article/25/egg" class="news-card">
                <div class="card-img-container">
                    <img src="/assets/article/egg.png" alt="Egg" onerror="this.src='/assets/icons/TylerGamezIconV2.png'">
                </div>
                <div class="card-body">
                    <div class="news-meta">
                        <span class="tag">Easter Egg</span>June 29, 2026
                    </div>
                    <h3>egg</h3>
                </div>
            </a>
        </div>

        <!-- Pagination Button matching image_cc8d02.png -->
        <div class="pagination-container">
            <a href="#" class="more-stories-btn">More Stories</a>
        </div>
    </main>

</body>
</html>
