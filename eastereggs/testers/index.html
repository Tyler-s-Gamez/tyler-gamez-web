<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESTRUCTIVE_TESTING_NODE</title>
    
    <link rel="icon" type="image/png" href="../../assets/icons/TylerGamezIconV2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Cyber-Grid / Glitch Aesthetic Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #030708;
            color: #33ff33; /* Matrix Green */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* CRT Scanlines Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 10;
            background-size: 100% 4px;
            pointer-events: none;
        }

        .tester-vault {
            background: rgba(5, 12, 8, 0.85);
            border: 2px dashed #ff6600; /* Danger Orange Border */
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.2), inset 0 0 20px rgba(255, 102, 0, 0.1);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            z-index: 5;
            position: relative;
        }

        /* Glitchy Icon */
        .bug-icon {
            font-size: 70px;
            color: #ff6600;
            text-shadow: 0 0 15px rgba(255, 102, 0, 0.6);
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-block;
        }

        .bug-icon:hover {
            animation: jitter 0.1s infinite;
        }

        h1 {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #33ff33;
            letter-spacing: -1px;
        }

        .console-logs {
            background: #000000;
            border: 1px solid rgba(51, 255, 51, 0.3);
            border-radius: 4px;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            height: 180px;
            overflow-y: auto;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .log-line.warn { color: #ff6600; }
        .log-line.success { color: #33ff33; }
        .log-line.error { color: #ff3333; font-weight: bold; animation: pulse 1s infinite; }

        /* Action button to break things */
        .inject-btn {
            background: #ff6600;
            color: #000000;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: inline-block;
            text-transform: uppercase;
        }

        .inject-btn:hover {
            background: #33ff33;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.6);
            transform: scale(1.05);
        }

        .back-btn {
            display: block;
            color: rgba(51, 255, 51, 0.6);
            text-decoration: none;
            font-size: 12px;
            margin-top: 15px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #33ff33;
            text-shadow: 0 0 5px #33ff33;
        }

        /* Glitch animations */
        @keyframes jitter {
            0% { transform: translate(0, 0) cubic-bezier(0.1, 0.85, 0.25, 1); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="tester-vault">
        <div class="bug-icon" id="bugTrigger" onclick="triggerGlitch()">
            <i class="fa-solid fa-bug"></i>
        </div>

        <h1>BETA_TESTER_SANDBOX // ENV: STAGING</h1>
        
        <div class="console-logs" id="consoleBox">
            <div class="log-line success">[OK] Connected to Tyler's Gamez Testing Suite Node.</div>
            <div class="log-line warn">[WARN] Unstable physics engine build detected.</div>
            <div class="log-line">[INFO] Click the bug node or inject bugs to locate memory leaks.</div>
        </div>

        <button class="inject-btn" onclick="injectBug()">Inject Memory Leak</button>

        <a href="/eastereggs/" class="back-btn">// RETURN_TO_SAFE_VAULT</a>
    </div>

    <script>
        const consoleBox = document.getElementById("consoleBox");
        
        const testLogs = [
            { type: 'error', text: '[CRITICAL] Buffer overflow detected in level rendering arrays.' },
            { type: 'warn', text: '[WARN] Frame budget exceeded by 42ms during collision simulation.' },
            { type: 'info', text: '[INFO] Beta tester flag parsed successfully: "Mil-Fish was here".' },
            { type: 'success', text: '[PATCH] Loaded anti-cheat validation sequence successfully.' },
            { type: 'error', text: '[FAIL] Fatal exception: user tried to wall-clip past game framework.' }
        ];

        function injectBug() {
            // Pick a random line from our tester responses
            const randomLog = testLogs[Math.floor(Math.random() * testLogs.length)];
            
            const newLog = document.createElement("div");
            newLog.className = `log-line ${randomLog.type}`;
            newLog.innerText = randomLog.text;
            
            consoleBox.appendChild(newLog);
            consoleBox.scrollTop = consoleBox.scrollHeight; // Auto-scroll to bottom
        }

        function triggerGlitch() {
            // Quick visual glitch effect when clicking the bug icon
            document.body.style.backgroundColor = "#ff6600";
            setTimeout(() => {
                document.body.style.backgroundColor = "#000000";
                setTimeout(() => {
                    document.body.style.backgroundColor = "#030708";
                }, 50);
            }, 50);

            const breakLog = document.createElement("div");
            breakLog.className = "log-line error";
            breakLog.innerText = `[CORE WARNING] Stress test loop forced by administrator. Matrix integrity compromised.`;
            consoleBox.appendChild(breakLog);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }
    </script>
</body>
</html>
