<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomalies // The Egg</title>
    
    <link rel="icon" type="image/png" href="../../assets/icons/TylerGamezIconV2.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Setup matching the Main Vault Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background glow */
        .glow-bg {
            position: absolute;
            width: 450px;
            height: 450px;
            background: rgba(157, 78, 221, 0.04);
            border-radius: 50%;
            filter: blur(100px);
            z-index: 1;
            pointer-events: none;
        }

        .egg-container {
            text-align: center;
            z-index: 5;
            max-width: 450px;
            width: 100%;
            background: rgba(18, 19, 26, 0.6);
            border: 1px solid rgba(157, 78, 221, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #8f9296;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        /* The Egg Interactive Object */
        .egg-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .the-egg {
            font-size: 110px;
            color: #9d4edd;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 20px rgba(157, 78, 221, 0.3));
        }

        .the-egg:active {
            transform: scale(0.85) rotate(4deg);
        }

        /* Clicking Ripple Effects */
        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 2px solid #9d4edd;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: rip 0.6s ease-out;
        }

        @keyframes rip {
            0% { width: 80px; height: 80px; opacity: 0.8; }
            100% { width: 220px; height: 220px; opacity: 0; }
        }

        /* Data Trackers */
        .counter-box {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            color: #c5c6c7;
            margin-bottom: 24px;
        }

        .counter-box strong {
            color: #9d4edd;
            font-size: 18px;
            font-family: monospace;
        }

        /* Return Link styling matching main file */
        .back-vault {
            color: #5f6368;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .back-vault:hover {
            color: #9d4edd;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <div class="egg-container">
        <h1>Sub-Layer Egg Room</h1>
        <p class="subtitle">Secure Zone // Object Code: 000-EGG</p>

        <div class="egg-wrapper" id="eggStage">
            <div class="the-egg" id="eggBtn">
                <i class="fa-solid fa-egg"></i>
            </div>
        </div>

        <div class="counter-box">
            Total Clicks Registered: <strong id="clickCounter">0</strong>
        </div>

        <div class="archive-footer">
            <a href="/eastereggs/" class="back-vault">
                <i class="fa-solid fa-box-archive"></i> Back to Vault
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const eggBtn = document.getElementById('eggBtn');
            const eggStage = document.getElementById('eggStage');
            const clickCounter = document.getElementById('clickCounter');
            
            // Load click count from local storage so it saves progress
            let count = localStorage.getItem('egg_clicks') ? parseInt(localStorage.getItem('egg_clicks')) : 0;
            clickCounter.textContent = count;

            eggBtn.addEventListener('click', () => {
                // Increment Count
                count++;
                clickCounter.textContent = count;
                localStorage.setItem('egg_clicks', count);

                // Add dynamic visual pop ripple
                const ripple = document.createElement('div');
                ripple.classList.add('ripple');
                eggStage.appendChild(ripple);

                // Clear ripple elements when done
                ripple.addEventListener('animationend', () => {
                    ripple.remove();
                });

                // Subtle milestone modifier (shakes egg at every 50 clicks)
                if (count % 50 === 0) {
                    eggBtn.style.transform = 'scale(1.2)';
                    setTimeout(() => { eggBtn.style.transform = 'none'; }, 150);
                }
            });
        });
    </script>
</body>
</html>
